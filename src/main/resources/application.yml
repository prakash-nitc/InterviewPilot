# ========================
# InterviewPilot Configuration
# ========================

spring:
  application:
    name: InterviewPilot

  # H2 In-Memory Database (dev profile)
  datasource:
    url: jdbc:h2:mem:interviewpilot
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  # H2 Console (accessible at /h2-console during development)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Thymeleaf
  thymeleaf:
    cache: false

# Server
server:
  port: 8080

# Gemini AI Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:your-api-key-here}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
  questions:
    count: 5
